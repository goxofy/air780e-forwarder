esphome:
  name: air780e-sms
  friendly_name: Air780E SMS

esp32:
  board: airm2m_core_esp32c3
  framework:
    type: arduino


#logger:
#  level: INFO
#  baud_rate: 115200

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  # ap: none


uart:
  id: uart_bus
  tx_pin: GPIO0
  rx_pin: GPIO1
  baud_rate: 115200
  rx_buffer_size: 256


# 收到的短信暴露为文本传感器, 通知/转发逻辑交给 Home Assistant 自动化处理
text_sensor:
  - platform: template
    name: "收到的短信"
    id: uart_text_sensor

# Define global variables
globals:
  - id: message_buffer
    type: std::string
    restore_value: no
    initial_value: '""'

  - id: utf8_temp
    type: std::vector<uint8_t>
    restore_value: no
    initial_value: 'std::vector<uint8_t>()'

  - id: last_uart_read
    type: unsigned long
    restore_value: no
    initial_value: '0'

interval:
  - interval: 50ms
    then:
      - lambda: |-
          while (id(uart_bus).available()) {
              id(last_uart_read) = millis();
              uint8_t byte;
              id(uart_bus).read_byte(&byte);
              // Add byte to buffer
              id(utf8_temp).push_back(byte);
              // Check if the current byte suggests the end of a UTF-8 character sequence
              if ((byte & 0x80) == 0 || (byte & 0xC0) == 0xC0) {
                if ((byte & 0xC0) == 0xC0) {
                  // Start of a new UTF-8 character sequence
                  if (!id(utf8_temp).empty()) {
                      std::string utf8_str(id(utf8_temp).begin(), id(utf8_temp).end() - 1);
                      id(message_buffer) += utf8_str;
                      id(utf8_temp).clear();
                      id(utf8_temp).push_back(byte);
                  }
                } else {
                  std::string utf8_str(id(utf8_temp).begin(), id(utf8_temp).end());
                  id(message_buffer) += utf8_str;
                  id(utf8_temp).clear();
                }
              }
          }
          // Publish after 3 seconds of inactivity
          if (!id(message_buffer).empty() && millis() - id(last_uart_read) > 3000) {
              // 跳过内部心跳 #ALIVE_REPORT, 只发布真实短信/通知
              if (id(message_buffer).compare(0, 13, "#ALIVE_REPORT") != 0) {
                  id(uart_text_sensor).publish_state(id(message_buffer));
              }
              id(message_buffer).clear();
          }


text:
  - platform: template
    name: "SMS 收件号码"
    id: sms_recipient
    optimistic: true
    min_length: 0
    max_length: 20
    mode: text

  - platform: template
    name: "SMS 内容"
    id: sms_content
    optimistic: true
    min_length: 0
    max_length: 255
    mode: text

button:
  - platform: template
    name: "发送短信"
    on_press:
      - uart.write: !lambda |-
          std::string cmd = "SMS," + id(sms_recipient).state + "," + id(sms_content).state + "\n";
          return std::vector<uint8_t>(cmd.begin(), cmd.end());

switch:
  - platform: restart
    name: "重启"
